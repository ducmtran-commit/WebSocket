<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Real-Time Collaborative Drawing App</title>
    <!-- This file links our CSS and sets up the page structure. -->
    <link rel="stylesheet" href="style.css" />
  </head>
  <body>
    <div class="container">
      <h1>Collaborative Drawing App</h1>
      <p>Open this page in two browser windows and draw together in real time.</p>

      <div class="toolbar">
        <div class="info">
          <span id="userInfo">User: ...</span>
          <span id="userCount">Users online: 0</span>
        </div>

        <label for="brushSize">
          Brush size:
          <span id="brushSizeValue">3</span>
        </label>
        <input id="brushSize" type="range" min="1" max="20" value="3" />
      </div>

      <button id="clearBtn">Clear Canvas</button>
      <canvas id="canvas" width="900" height="500"></canvas>
    </div>

    <!-- Socket.IO client library served automatically by the server -->
    <script src="/socket.io/socket.io.js"></script>
    <script src="client.js"></script>
  </body>
</html>
