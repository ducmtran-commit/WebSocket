<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Real-Time Collaborative Drawing App</title>
    <!-- This file links our CSS and sets up the page structure. -->
    <link rel="stylesheet" href="style.css" />
  </head>
  <body>
    <header class="hero">
      <div class="container">
        <h1>Collaborative Drawing App</h1>
        <p class="subtitle">
          A simple real-time whiteboard for class projects, powered by Node.js + Socket.IO.
        </p>
      </div>
    </header>

    <main class="container">
      <section class="card controls">
        <div class="toolbar">
          <div class="info">
            <span id="userInfo" class="pill">User: ...</span>
            <span id="userCount" class="pill">Users online: 0</span>
          </div>

          <label for="brushSize" class="brush-label">
            Brush size:
            <strong id="brushSizeValue">3</strong>
          </label>
          <input id="brushSize" type="range" min="1" max="20" value="3" />

          <button id="clearBtn">Clear Canvas</button>
        </div>
      </section>

      <section class="card canvas-card">
        <canvas id="canvas" width="900" height="500"></canvas>
      </section>
    </main>

    <footer class="site-footer">
      <div class="container">Tip: Open in two tabs to test collaboration live.</div>
    </footer>

    <!-- Use CDN so frontend also works when hosted on GitHub Pages -->
    <script src="https://cdn.socket.io/4.8.1/socket.io.min.js"></script>
    <script src="client.js"></script>
  </body>
</html>
