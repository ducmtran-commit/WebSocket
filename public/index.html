<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>PixTogether</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Press+Start+2P&family=VT323&display=swap"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="style.css" />
  </head>
  <body class="app-gated">
    <div id="launchGate" class="launch-gate" role="dialog" aria-modal="true" aria-labelledby="launchTitle">
      <div class="launch-center">
        <div id="launchShell" class="launch-shell">
          <p id="launchTitle" class="launch-logo">PIXTOGETHER</p>
          <p class="launch-subtitle">8-BIT LIVE PIXEL ARENA</p>
          <div class="launch-room-row">
            <label class="launch-room-label" for="launchRoomInput">ROOM</label>
            <input
              id="launchRoomInput"
              class="launch-room-input"
              type="text"
              value="LOBBY"
              maxlength="20"
              spellcheck="false"
              autocomplete="off"
            />
          </div>
          <div id="launchRoomCodeRow" class="launch-room-row">
            <label class="launch-room-label" for="launchRoomCodeInput">PASSWORD</label>
            <input
              id="launchRoomCodeInput"
              class="launch-room-input"
              type="text"
              placeholder="ROOM PASSWORD"
              maxlength="20"
              spellcheck="false"
              autocomplete="off"
            />
          </div>
          <p id="launchRoomHint" class="launch-room-hint">5 rooms max, 30 players each.</p>
          <div class="launch-rooms-panel" aria-live="polite">
            <p class="launch-rooms-title">ROOM STATUS</p>
            <div id="launchRoomList" class="launch-room-list"></div>
          </div>
          <div class="launch-menu" role="group" aria-label="Main menu">
            <button id="launchStartBtn" class="launch-menu-btn" type="button">START</button>
            <button id="launchJoinBtn" class="launch-menu-btn" type="button">JOIN ROOM</button>
            <button id="launchCreateBtn" class="launch-menu-btn" type="button">CREATE ROOM</button>
          </div>
          <p class="launch-press-start" aria-live="polite">START JOINS THE PUBLIC LOBBY</p>
        </div>
      </div>
    </div>
    <main class="layout">
      <section id="workspacePanel" class="workspace-panel floating-panel">
        <div id="workspaceHandle" class="workspace-drag-handle">
          <span class="drag-title">Workspace (Tab)</span>
          <div class="panel-actions">
            <button id="workspaceCollapseBtn" type="button" aria-expanded="true" aria-controls="workspaceScroll">
              Collapse
            </button>
            <button id="autoHideBtn" type="button">Auto-hide: On</button>
          </div>
        </div>
        <div id="workspaceScroll" class="workspace-scroll" role="region" aria-label="Workspace sections">
          <div id="workspaceSectionStack" class="workspace-section-stack">
          <div class="workspace-section-row">
            <section id="section-toolbox" class="workspace-section">
              <div class="section-header">
                <span class="section-drag-handle" title="Drag to reorder" aria-label="Drag to reorder"></span>
                <span class="section-title">Tools</span>
                <button type="button" class="section-collapse-btn" aria-expanded="true" aria-label="Collapse section">
                  ▾
                </button>
              </div>
              <div class="workspace-section-body">
              <h1>PixTogether</h1>
              <p class="subtitle">Everyone paints the same board in real time.</p>
              <div class="panel">
                <label for="nameInput">Display Name</label>
                <div class="row">
                  <input id="nameInput" type="text" maxlength="20" value="Student" />
                  <button id="setNameBtn">Update</button>
                </div>
                <label for="colorInput">Brush Color</label>
                <div class="row">
                  <input id="colorInput" type="color" value="#22c55e" />
                  <button id="eraserBtn">Eraser: Off</button>
                  <button id="clearBtn">Clear My Drawing</button>
                </div>
                <label>Color History</label>
                <div id="colorHistory" class="color-history"></div>
                <label for="zoomInput">Zoom</label>
                <div class="row">
                  <button id="zoomOutBtn">-</button>
                  <input id="zoomInput" type="range" min="0.7" max="1.4" step="0.05" value="0.9" />
                  <button id="zoomInBtn">+</button>
                </div>
                <p id="zoomText">Zoom: 100%</p>
                <p id="toolText">Tool: Brush</p>
                <p id="statusText">Status: connecting...</p>
                <p id="roomText">Room: -</p>
                <div class="row">
                  <button id="copyRoomCodeBtn" type="button">Copy Room Password</button>
                </div>
                <p id="playersText">Artists online: 0</p>
              </div>
              </div>
            </section>
          </div>
          <div class="workspace-section-row">
            <section id="section-chat" class="workspace-section">
              <div class="section-header">
                <span class="section-drag-handle" title="Drag to reorder" aria-label="Drag to reorder"></span>
                <span class="section-title">Chat</span>
                <button type="button" class="section-collapse-btn" aria-expanded="true" aria-label="Collapse section">
                  ▾
                </button>
              </div>
              <div class="workspace-section-body">
              <div class="panel">
                <div id="chatBox" class="chat-box"></div>
                <div class="row">
                  <input id="chatInput" type="text" maxlength="120" placeholder="Say something..." />
                  <button id="sendChatBtn">Send</button>
                </div>
              </div>
              </div>
            </section>
          </div>
          <div class="workspace-section-row">
            <section id="section-artists" class="workspace-section">
              <div class="section-header">
                <span class="section-drag-handle" title="Drag to reorder" aria-label="Drag to reorder"></span>
                <span class="section-title">Artists</span>
                <button type="button" class="section-collapse-btn" aria-expanded="true" aria-label="Collapse section">
                  ▾
                </button>
              </div>
              <div class="workspace-section-body">
              <div class="panel">
                <ul id="userList"></ul>
              </div>
              </div>
            </section>
          </div>
          </div>
        </div>
      </section>

      <section class="right">
        <div id="boardViewport" class="board-viewport">
          <div id="board" class="board"></div>
        </div>
      </section>
    </main>
    <script src="client.js"></script>
  </body>
</html>
