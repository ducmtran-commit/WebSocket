<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Grid Arena (WebSocket)</title>
    <link rel="stylesheet" href="style.css" />
  </head>
  <body>
    <main class="layout">
      <section class="left">
        <h1>Grid Arena</h1>
        <p class="subtitle">Move with arrow keys. Tag other players to gain points.</p>
        <div class="panel">
          <label for="nameInput">Display Name</label>
          <div class="row">
            <input id="nameInput" type="text" maxlength="20" value="Student" />
            <button id="setNameBtn">Update</button>
          </div>
          <p id="statusText">Status: connecting...</p>
          <p id="playersText">Players: 0</p>
        </div>

        <div class="panel">
          <h2>Chat</h2>
          <div id="chatBox" class="chat-box"></div>
          <div class="row">
            <input id="chatInput" type="text" maxlength="120" placeholder="Say something..." />
            <button id="sendChatBtn">Send</button>
          </div>
        </div>
      </section>

      <section class="right">
        <div id="board" class="board"></div>
        <div class="legend">
          <h3>Scoreboard</h3>
          <ul id="scoreList"></ul>
        </div>
      </section>
    </main>
    <script src="client.js"></script>
  </body>
</html>
