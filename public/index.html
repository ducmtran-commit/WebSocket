<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Co-op Pixel Board</title>
    <link rel="stylesheet" href="style.css" />
  </head>
  <body>
    <main class="layout">
      <section id="toolboxPanel" class="left floating-panel">
        <button id="toolboxFab" class="toolbox-fab" type="button" aria-label="Open toolbox">🎨</button>
        <div id="toolboxHandle" class="left-drag-handle">
          <span class="drag-title">Drag Toolbox</span>
          <div class="toolbox-actions">
            <button id="autoHideBtn" type="button">Auto-hide: On</button>
          </div>
        </div>
        <div class="toolbox-content">
          <h1>Co-op Pixel Board</h1>
          <p class="subtitle">Everyone paints the same board in real time.</p>
          <div class="panel">
          <label for="nameInput">Display Name</label>
          <div class="row">
            <input id="nameInput" type="text" maxlength="20" value="Student" />
            <button id="setNameBtn">Update</button>
          </div>
          <label for="colorInput">Brush Color</label>
          <div class="row">
            <input id="colorInput" type="color" value="#22c55e" />
            <button id="eraserBtn">Eraser: Off</button>
            <button id="clearBtn">Clear My Drawing</button>
          </div>
          <label>Color History</label>
          <div id="colorHistory" class="color-history"></div>
          <label for="zoomInput">Zoom</label>
          <div class="row">
            <button id="zoomOutBtn">-</button>
            <input id="zoomInput" type="range" min="0.7" max="1.4" step="0.05" value="0.9" />
            <button id="zoomInBtn">+</button>
          </div>
          <p id="zoomText">Zoom: 100%</p>
          <p id="toolText">Tool: Brush</p>
          <p id="statusText">Status: connecting...</p>
          <p id="playersText">Artists online: 0</p>
          </div>
        </div>
      </section>

      <section id="chatPanel" class="chat-panel floating-panel">
        <button id="chatFab" class="toolbox-fab" type="button" aria-label="Open chat">💬</button>
        <div id="chatHandle" class="left-drag-handle">
          <span class="drag-title">Drag Chat</span>
        </div>
        <div class="chat-content">
          <div class="panel">
            <h2>Chat</h2>
            <div id="chatBox" class="chat-box"></div>
            <div class="row">
              <input id="chatInput" type="text" maxlength="120" placeholder="Say something..." />
              <button id="sendChatBtn">Send</button>
            </div>
          </div>
        </div>
      </section>

      <section class="right">
        <div id="boardViewport" class="board-viewport">
          <div id="board" class="board"></div>
        </div>
        <div class="legend">
          <h3>Artists Online</h3>
          <ul id="userList"></ul>
        </div>
      </section>
    </main>
    <script src="client.js"></script>
  </body>
</html>
