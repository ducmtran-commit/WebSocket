<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Co-op Pixel Board</title>
    <link rel="stylesheet" href="style.css" />
  </head>
  <body>
    <main class="layout">
      <section class="left">
        <h1>Co-op Pixel Board</h1>
        <p class="subtitle">Everyone paints the same board in real time.</p>
        <div class="panel">
          <label for="nameInput">Display Name</label>
          <div class="row">
            <input id="nameInput" type="text" maxlength="20" value="Student" />
            <button id="setNameBtn">Update</button>
          </div>
          <label for="colorInput">Brush Color</label>
          <div class="row">
            <input id="colorInput" type="color" value="#22c55e" />
            <button id="eraserBtn">Eraser: Off</button>
            <button id="clearBtn">Clear Board</button>
          </div>
          <p id="toolText">Tool: Brush</p>
          <p id="statusText">Status: connecting...</p>
          <p id="playersText">Artists online: 0</p>
        </div>

        <div class="panel">
          <h2>Chat</h2>
          <div id="chatBox" class="chat-box"></div>
          <div class="row">
            <input id="chatInput" type="text" maxlength="120" placeholder="Say something..." />
            <button id="sendChatBtn">Send</button>
          </div>
        </div>
      </section>

      <section class="right">
        <div id="board" class="board"></div>
        <div class="legend">
          <h3>Artists Online</h3>
          <ul id="userList"></ul>
        </div>
      </section>
    </main>
    <script src="client.js"></script>
  </body>
</html>
